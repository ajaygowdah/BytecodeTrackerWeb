<!DOCTYPE html>
<html>
<head>

<title>Register - CUSTOM JVM BYTECODE ANALYZER</title>

<style>

body{
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
background:#1e293b;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0px 0px 20px rgba(0,0,0,0.5);
text-align:center;
}

h1{
color:#38bdf8;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>

</head>

<body>

<div class="container">

<h1>Create Account</h1>

<form action="/register" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

</div>

</body>
</html>
