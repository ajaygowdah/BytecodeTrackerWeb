<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - CMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
        }
        
        .user-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab-btn {
            padding: 15px 25px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-small {
            padding: 8px 15px;
            font-size: 13px;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .search-box input {
            flex: 1;
        }
        
        .search-box button {
            width: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        table th {
            background: #f5f7fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
        }
        
        table td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        table tr:hover {
            background: #f9f9f9;
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
            display: block;
        }
        
        .message.error {
            background: #ffebee;
            color: #d32f2f;
            border-left: 4px solid #f44336;
            display: block;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-state p {
            font-size: 18px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📝 User Dashboard</h1>
        <div class="user-info">
            <span>Welcome, <strong id="username"></strong></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('mycontent')">📄 My Content</button>
            <button class="tab-btn" onclick="showTab('allcontent')">🌐 All Content</button>
        </div>
        
        <!-- MY CONTENT TAB -->
        <div id="mycontent" class="tab-content active">
            <div class="card">
                <h2>Add New Content</h2>
                <div id="contentMessage" class="message"></div>
                <form id="addContentForm">
                    <div class="form-group">
                        <label for="contentTitle">Title</label>
                        <input type="text" id="contentTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="contentDesc">Description</label>
                        <textarea id="contentDesc" required></textarea>
                    </div>
                    <button type="submit" class="btn">Add Content</button>
                </form>
            </div>
            
            <div class="card">
                <h2>My Content</h2>
                <div class="search-box">
                    <input type="text" id="myContentSearch" placeholder="Search your content...">
                    <button class="btn" onclick="searchMyContent()">Search</button>
                    <button class="btn" onclick="getMyContent()" style="background: #999;">Refresh</button>
                </div>
                <div id="myContentList"></div>
            </div>
        </div>
        
        <!-- ALL CONTENT TAB -->
        <div id="allcontent" class="tab-content">
            <div class="card">
                <h2>All Content</h2>
                <div class="search-box">
                    <input type="text" id="allContentSearch" placeholder="Search all content...">
                    <button class="btn" onclick="searchAllContent()">Search</button>
                    <button class="btn" onclick="getAllContent()" style="background: #999;">Refresh</button>
                </div>
                <div id="allContentList"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        // Check if user is logged in
        window.addEventListener('load', function() {
            const username = localStorage.getItem('username');
            
            if (!username) {
                window.location.href = 'login.html';
                return;
            }
            
            document.getElementById('username').textContent = username;
            
            // Load initial data
            getMyContent();
            getAllContent();
        });
        
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }
        
        // ========== ADD CONTENT ==========
        
        document.getElementById('addContentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const title = document.getElementById('contentTitle').value;
            const description = document.getElementById('contentDesc').value;
            const userId = localStorage.getItem('user_id');
            
            try {
                const response = await fetch(API_URL + '/content', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        title: title,
                        description: description,
                        created_by: userId
                    })
                });
                
                const data = await response.json();
                const msgDiv = document.getElementById('contentMessage');
                
                if (data.success) {
                    msgDiv.textContent = '✅ Content created successfully!';
                    msgDiv.classList.add('success');
                    document.getElementById('addContentForm').reset();
                    setTimeout(() => {
                        getMyContent();
                        getAllContent();
                    }, 1000);
                } else {
                    msgDiv.textContent = '❌ Error: ' + data.message;
                    msgDiv.classList.add('error');
                }
                
                setTimeout(() => {
                    msgDiv.classList.remove('success', 'error');
                }, 3000);
            } catch (error) {
                console.error('Error:', error);
            }
        });
        
        // ========== MY CONTENT ==========
        
        async function getMyContent() {
            try {
                const response = await fetch(API_URL + '/content');
                const data = await response.json();
                
                if (data.success) {
                    const userId = localStorage.getItem('user_id');
                    const myContent = data.data.filter(item => item.created_by === parseInt(userId));
                    displayMyContent(myContent);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function searchMyContent() {
            const searchTerm = document.getElementById('myContentSearch').value;
            if (!searchTerm) {
                getMyContent();
                return;
            }
            
            try {
                const response = await fetch(API_URL + '/content');
                const data = await response.json();
                
                if (data.success) {
                    const userId = localStorage.getItem('user_id');
                    const filtered = data.data.filter(item => 
                        item.created_by === parseInt(userId) &&
                        (item.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                         item.description.toLowerCase().includes(searchTerm.toLowerCase()))
                    );
                    displayMyContent(filtered);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function displayMyContent(contents) {
            const container = document.getElementById('myContentList');
            
            if (contents.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>You have no content yet</p></div>';
                return;
            }
            
            let html = '<table>';
            html += '<th>Title</th><th>Description</th><th>Date</th><th>Action</th>';
            
            contents.forEach(content => {
                html += `<tr>
                    <td><strong>${content.title}</strong></td>
                    <td>${content.description.substring(0, 50)}...</td>
                    <td>${content.date_created}</td>
                    <td>
                        <button class="btn btn-small btn-danger" onclick="deleteMyContent(${content.content_id})">Delete</button>
                    </td>
                </tr>`;
            });
            
            html += '</table>';
            container.innerHTML = html;
        }
        
        async function deleteMyContent(contentId) {
            if (!confirm('Are you sure you want to delete this content?')) return;
            
            const userId = localStorage.getItem('user_id');
            
            try {
                const response = await fetch(API_URL + '/content', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        content_id: contentId,
                        deleted_by: userId
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    getMyContent();
                    getAllContent();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        // ========== ALL CONTENT ==========
        
        async function getAllContent() {
            try {
                const response = await fetch(API_URL + '/content');
                const data = await response.json();
                
                if (data.success) {
                    displayAllContent(data.data);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function searchAllContent() {
            const searchTerm = document.getElementById('allContentSearch').value;
            if (!searchTerm) {
                getAllContent();
                return;
            }
            
            try {
                const response = await fetch(API_URL + '/content');
                const data = await response.json();
                
                if (data.success) {
                    const filtered = data.data.filter(item => 
                        item.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        item.description.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                    displayAllContent(filtered);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function displayAllContent(contents) {
            const container = document.getElementById('allContentList');
            
            if (contents.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No content available</p></div>';
                return;
            }
            
            let html = '<table>';
            html += '<th>Title</th><th>Description</th><th>Created By</th><th>Date</th>';
            
            contents.forEach(content => {
                html += `<tr>
                    <td><strong>${content.title}</strong></td>
                    <td>${content.description.substring(0, 50)}...</td>
                    <td>${content.username}</td>
                    <td>${content.date_created}</td>
                </tr>`;
            });
            
            html += '</table>';
            container.innerHTML = html;
        }
        
        function logout() {
            localStorage.removeItem('user_id');
            localStorage.removeItem('username');
            localStorage.removeItem('role');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
