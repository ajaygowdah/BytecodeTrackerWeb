<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
        }
        
        .user-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .user-welcome {
            text-align: right;
        }
        
        .user-welcome strong {
            font-size: 16px;
        }
        
        .user-role {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
            transform: translateY(-2px);
        }
        
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: all 0.3s;
            border-top: 4px solid #667eea;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        
        .stat-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
        
        .stat-label {
            color: #999;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-number {
            color: #667eea;
            font-size: 36px;
            font-weight: 700;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 3px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            padding: 0 20px;
            border-radius: 15px 15px 0 0;
            backdrop-filter: blur(10px);
        }
        
        .tab-btn {
            padding: 18px 30px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            border-bottom: 4px solid transparent;
            transition: all 0.3s;
        }
        
        .tab-btn:hover {
            color: white;
        }
        
        .tab-btn.active {
            color: white;
            border-bottom-color: white;
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-small {
            padding: 8px 15px;
            font-size: 13px;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
        }
        
        .btn-danger:hover {
            box-shadow: 0 10px 25px rgba(244, 67, 54, 0.4);
        }
        
        .btn-edit {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .search-box input {
            flex: 1;
            min-width: 200px;
        }
        
        .search-box button {
            width: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        table th {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #667eea;
        }
        
        table td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        table tr:hover {
            background: #f8f9fa;
            transition: all 0.3s;
        }
        
        .message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
            display: block;
        }
        
        .message.error {
            background: #ffebee;
            color: #d32f2f;
            border-left: 4px solid #f44336;
            display: block;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: #999;
        }
        
        .empty-state p {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }
        
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 40px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .modal-header {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
        }
        
        .close-btn {
            float: right;
            font-size: 28px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            color: #333;
        }
        
        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: flex-end;
        }
        
        .btn-cancel {
            background: #e0e0e0;
            color: #333;
        }
        
        .activity-item {
            padding: 20px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            margin-bottom: 15px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .activity-item:hover {
            background: #f0f4ff;
            transform: translateX(5px);
        }
        
        .activity-action {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .activity-action.create {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .activity-action.edit {
            background: #e3f2fd;
            color: #1565c0;
        }
        
        .activity-action.delete {
            background: #ffebee;
            color: #d32f2f;
        }
        
        .activity-action.login {
            background: #f3e5f5;
            color: #6a1b9a;
        }
        
        .activity-description {
            color: #666;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .activity-time {
            color: #999;
            font-size: 12px;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
            }
            
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 Admin Dashboard</h1>
        <div class="user-info">
            <div class="user-welcome">
                <div>Welcome, <strong id="username"></strong></div>
                <div class="user-role">Administrator</div>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    
    <div class="container">
        <!-- Statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-label">Total Users</div>
                <div class="stat-number" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📄</div>
                <div class="stat-label">Total Content</div>
                <div class="stat-number" id="totalContent">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-label">Today Activities</div>
                <div class="stat-number" id="todayActivities">0</div>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('content')">📄 Content</button>
            <button class="tab-btn" onclick="showTab('users')">👥 Users</button>
            <button class="tab-btn" onclick="showTab('activity')">📊 Activity Logs</button>
        </div>
        
        <!-- CONTENT TAB -->
        <div id="content" class="tab-content active">
            <div class="card">
                <h2>➕ Add New Content</h2>
                <div id="contentMessage" class="message"></div>
                <form id="addContentForm">
                    <div class="form-group">
                        <label for="contentTitle">Title</label>
                        <input type="text" id="contentTitle" placeholder="Enter content title" required>
                    </div>
                    <div class="form-group">
                        <label for="contentDesc">Description</label>
                        <textarea id="contentDesc" placeholder="Enter content description" required></textarea>
                    </div>
                    <button type="submit" class="btn">Add Content</button>
                </form>
            </div>
            
            <div class="card">
                <h2>📋 All Content</h2>
                <div class="search-box">
                    <input type="text" id="contentSearch" placeholder="🔍 Search content by title or description...">
                    <button class="btn" onclick="searchContent()">Search</button>
                    <button class="btn" onclick="getAllContent()" style="background: #999;">Refresh</button>
                </div>
                <div id="contentList"></div>
            </div>
        </div>
        
        <!-- USERS TAB -->
        <div id="users" class="tab-content">
            <div class="card">
                <h2>➕ Add New User</h2>
                <div id="userMessage" class="message"></div>
                <form id="addUserForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="newUsername">Username</label>
                            <input type="text" id="newUsername" placeholder="Enter username" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="Enter email" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" placeholder="Enter password" required>
                        </div>
                        <div class="form-group">
                            <label for="role">Role</label>
                            <select id="role" required>
                                <option value="">Select Role</option>
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn">Add User</button>
                </form>
            </div>
            
            <div class="card">
                <h2>👥 All Users</h2>
                <div class="search-box">
                    <input type="text" id="userSearch" placeholder="🔍 Search users by username or email...">
                    <button class="btn" onclick="searchUsers()">Search</button>
                    <button class="btn" onclick="getAllUsers()" style="background: #999;">Refresh</button>
                </div>
                <div id="usersList"></div>
            </div>
        </div>
        
        <!-- ACTIVITY TAB -->
        <div id="activity" class="tab-content">
            <div class="card">
                <h2>📊 Activity Logs</h2>
                <div id="activityList"></div>
            </div>
        </div>
    </div>
    
    <!-- Edit Content Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeEditModal()">&times;</span>
            <div class="modal-header">✏️ Edit Content</div>
            <form id="editForm">
                <div class="form-group">
                    <label for="editTitle">Title</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label for="editDescription">Description</label>
                    <textarea id="editDescription" required></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5000/api';
        let editingContentId = null;
        
        window.addEventListener('load', function() {
            const username = localStorage.getItem('username');
            const role = localStorage.getItem('role');
            
            if (!username || role !== 'admin') {
                window.location.href = 'login.html';
                return;
            }
            
            document.getElementById('username').textContent = username;
            getAllContent();
            getAllUsers();
            getStats();
            getActivityLogs();
        });
        
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'activity') {
                getActivityLogs();
            }
        }
        
        // ========== CONTENT FUNCTIONS ==========
        
        document.getElementById('addContentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const title = document.getElementById('contentTitle').value;
            const description = document.getElementById('contentDesc').value;
            const userId = localStorage.getItem('user_id');
            
            try {
                const response = await fetch(API_URL + '/content', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description, created_by: userId })
                });
                
                const data = await response.json();
                const msgDiv = document.getElementById('contentMessage');
                
                if (data.success) {
                    msgDiv.textContent = '✅ Content created successfully!';
                    msgDiv.classList.remove('error');
                    msgDiv.classList.add('success');
                    document.getElementById('addContentForm').reset();
                    setTimeout(() => {
                        getAllContent();
                        getStats();
                    }, 1000);
                } else {
                    msgDiv.textContent = '❌ Error: ' + data.message;
                    msgDiv.classList.remove('success');
                    msgDiv.classList.add('error');
                }
                
                setTimeout(() => {
                    msgDiv.classList.remove('success', 'error');
                }, 4000);
            } catch (error) {
                console.error('Error:', error);
            }
        });
        
        async function getAllContent() {
            try {
                const response = await fetch(API_URL + '/content');
                const data = await response.json();
                
                if (data.success) {
                    displayContent(data.data);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function searchContent() {
            const searchTerm = document.getElementById('contentSearch').value;
            if (!searchTerm) {
                getAllContent();
                return;
            }
            
            try {
                const response = await fetch(API_URL + '/content');
                const data = await response.json();
                
                if (data.success) {
                    const filtered = data.data.filter(item => 
                        item.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        item.description.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                    displayContent(filtered);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function displayContent(contents) {
            const container = document.getElementById('contentList');
            
            if (contents.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>📭 No content found</p></div>';
                return;
            }
            
            let html = '<table>';
            html += '<tr><th>Title</th><th>Description</th><th>Author</th><th>Date</th><th>Actions</th></tr>';
            
            contents.forEach(content => {
                html += `<tr>
                    <td><strong>${content.title}</strong></td>
                    <td>${content.description.substring(0, 50)}...</td>
                    <td>${content.username}</td>
                    <td>${content.date_created}</td>
                    <td>
                        <button class="btn btn-small btn-edit" onclick="editContent(${content.content_id}, '${content.title.replace(/'/g, "\\'")}', '${content.description.replace(/'/g, "\\'")}')" style="margin-right: 5px;">✏️ Edit</button>
                        <button class="btn btn-small btn-danger" onclick="deleteContent(${content.content_id})">🗑️ Delete</button>
                    </td>
                </tr>`;
            });
            
            html += '</table>';
            container.innerHTML = html;
        }
        
        function editContent(contentId, title, description) {
            editingContentId = contentId;
            document.getElementById('editTitle').value = title;
            document.getElementById('editDescription').value = description;
            document.getElementById('editModal').style.display = 'block';
        }
        
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            editingContentId = null;
        }
        
        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const title = document.getElementById('editTitle').value;
            const description = document.getElementById('editDescription').value;
            const userId = localStorage.getItem('user_id');
            
            try {
                const response = await fetch(API_URL + '/content/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content_id: editingContentId,
                        title,
                        description,
                        user_id: userId
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Content updated successfully!');
                    closeEditModal();
                    getAllContent();
                    getStats();
                } else {
                    alert('❌ Error: ' + data.message);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });
        
        async function deleteContent(contentId) {
            if (!confirm('Are you sure you want to delete this content?')) return;
            
            const userId = localStorage.getItem('user_id');
            
            try {
                const response = await fetch(API_URL + '/content', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content_id: contentId, deleted_by: userId })
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('✅ Content deleted successfully!');
                    getAllContent();
                    getStats();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        // ========== USER FUNCTIONS ==========
        
        document.getElementById('addUserForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('newUsername').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            try {
                const response = await fetch(API_URL + '/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, role })
                });
                
                const data = await response.json();
                const msgDiv = document.getElementById('userMessage');
                
                if (data.success) {
                    msgDiv.textContent = '✅ User created successfully!';
                    msgDiv.classList.remove('error');
                    msgDiv.classList.add('success');
                    document.getElementById('addUserForm').reset();
                    setTimeout(() => {
                        getAllUsers();
                        getStats();
                    }, 1000);
                } else {
                    msgDiv.textContent = '❌ Error: ' + data.message;
                    msgDiv.classList.remove('success');
                    msgDiv.classList.add('error');
                }
                
                setTimeout(() => {
                    msgDiv.classList.remove('success', 'error');
                }, 4000);
            } catch (error) {
                console.error('Error:', error);
            }
        });
        
        async function getAllUsers() {
            try {
                const response = await fetch(API_URL + '/users');
                const data = await response.json();
                
                if (data.success) {
                    displayUsers(data.data);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function searchUsers() {
            const searchTerm = document.getElementById('userSearch').value;
            if (!searchTerm) {
                getAllUsers();
                return;
            }
            
            try {
                const response = await fetch(API_URL + '/users');
                const data = await response.json();
                
                if (data.success) {
                    const filtered = data.data.filter(item => 
                        item.username.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        item.email.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                    displayUsers(filtered);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function displayUsers(users) {
            const container = document.getElementById('usersList');
            
            if (users.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>👥 No users found</p></div>';
                return;
            }
            
            let html = '<table>';
            html += '<tr><th>Username</th><th>Email</th><th>Role</th><th>Status</th></tr>';
            
            users.forEach(user => {
                html += `<tr>
                    <td><strong>${user.username}</strong></td>
                    <td>${user.email}</td>
                    <td><span style="background: ${user.role === 'admin' ? '#e3f2fd' : '#f3e5f5'}; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;">${user.role}</span></td>
                    <td><span style="background: #e8f5e9; color: #2e7d32; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;">● ${user.status}</span></td>
                </tr>`;
            });
            
            html += '</table>';
            container.innerHTML = html;
        }
        
        // ========== STATS FUNCTIONS ==========
        
        async function getStats() {
            try {
                const response = await fetch(API_URL + '/stats');
                const data = await response.json();
                
                if (data.success) {
                    const stats = data.data;
                    document.getElementById('totalUsers').textContent = stats.total_users;
                    document.getElementById('totalContent').textContent = stats.total_content;
                    document.getElementById('todayActivities').textContent = stats.today_activities;
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function getActivityLogs() {
            try {
                const response = await fetch(API_URL + '/activity');
                const data = await response.json();
                
                if (data.success) {
                    displayActivityLogs(data.data);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function displayActivityLogs(logs) {
            const container = document.getElementById('activityList');
            
            if (logs.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>📭 No activity logs found</p></div>';
                return;
            }
            
            let html = '';
            logs.forEach(log => {
                const actionClass = log.action.toLowerCase();
                html += `
                    <div class="activity-item">
                        <span class="activity-action ${actionClass}">${log.action}</span>
                        <div style="margin-top: 8px;">
                            <strong>${log.username}</strong>
                            <div class="activity-description">${log.description}</div>
                            <div class="activity-time">⏰ ${log.timestamp}</div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('user_id');
                localStorage.removeItem('username');
                localStorage.removeItem('role');
                window.location.href = 'login.html';
            }
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target == modal) {
                closeEditModal();
            }
        }
    </script>
</body>
</html>
